  """A `DocumentGroup` references all signers and the documents after they have been filled and sent out for signature."""
  documentGroup: DocumentGroup

  """Get all `SignerTokens` this signer has available."""
  signerTokens: [SignerToken]
  createdAt: Date
  updatedAt: Date

  """Timestamp when the `Signer` has finished signing."""
  completedAt: Date

  """Your id for the person signing: a way to trace this signer back to a user in your system."""
  clientUserId: String
}

