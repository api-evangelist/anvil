  updateSigner(eid: String!, name: String, email: String): Signer

  updateSubmission(eid: String!, isExcluded: Boolean): Submission

  updateWebhook(eid: String!, url: String): Organization

  """Update a `Weld` with new properties."""
  updateWeld(
